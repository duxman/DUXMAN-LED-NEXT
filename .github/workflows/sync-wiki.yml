name: Sync Wiki from /wiki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - '.github/workflows/sync-wiki.yml'

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync local wiki folder to GitHub Wiki
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -d "wiki" ]; then
            echo "No wiki folder found in repository."
            exit 1
          fi

          if [ ! -f "wiki/Home.md" ]; then
            echo "wiki/Home.md is required by GitHub Wiki and was not found."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${TOKEN}@github.com/${REPO}.wiki.git" wiki-repo

          rsync -av --delete --exclude '.git' wiki/ wiki-repo/

          cd wiki-repo

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(wiki): sync from repository wiki folder"
            git push
            echo "Wiki synchronized successfully."
          else
            echo "No wiki changes to synchronize."
          fi
