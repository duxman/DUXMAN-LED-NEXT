<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>DUXMAN API - Sync</title>
  __CSS__
</head>
<body>
<div class='gen-page-outer'>
<script>
  (function() {
    try {
      var request = new XMLHttpRequest();
      request.open('GET', '/ui/nav.html?v=20260502', false);
      request.send(null);
      if (request.status >= 200 && request.status < 300 && request.responseText) {
        document.write(request.responseText);
        return;
      }
    } catch (_) {}
    document.write("<nav class='gen-nav' style='padding:12px 16px;'>Navigation unavailable</nav>");
  })();
</script>
  <main>
    <div class='card'>
      <h1>API Sync</h1>
      <p class='hint'>Pruebas rapidas para estado, configuracion, salud runtime y cambio de modo de sincronizacion.</p>
      <div class='actions'>
        <button onclick='getState()'>GET /api/v1/sync/state</button>
        <button onclick='getConnected()'>GET /api/v1/sync/connected</button>
        <button onclick='getConfig()'>GET /api/v1/sync/config</button>
        <button onclick='patchConfig()'>PATCH /api/v1/sync/config</button>
        <button class='alt' onclick='patchMode()'>PATCH /api/v1/sync/mode</button>
        <button class='alt' onclick='togglePolling()'>Auto poll</button>
      </div>
    </div>

    <div class='card'>
      <h2>Payload config</h2>
      <textarea id='configPayload'>{"sync":{"enabled":true,"mode":"ledfx_realtime","role":"client","inputProtocol":"ddp","ddpPort":4048,"udpSyncPort":21324,"sourceTimeoutMs":1500,"groupMask":1,"clockSmoothing":"soft","e131UniverseStart":1,"e131UniverseCount":1}}</textarea>
    </div>

    <div class='card'>
      <h2>Cambio rapido de modo</h2>
      <div class='row'>
        <div class='col field'>
          <label for='modeValue'>Modo</label>
          <select id='modeValue'>
            <option value='off'>off</option>
            <option value='local_effects'>local_effects</option>
            <option value='ledfx_realtime'>ledfx_realtime</option>
            <option value='cluster_sync'>cluster_sync</option>
          </select>
        </div>
      </div>
    </div>

    <div class='card'>
      <h2>Resumen runtime</h2>
      <pre id='summary'>Sin datos aun.</pre>
    </div>

    <div class='card'>
      <pre id='out'>Sin llamadas aun.</pre>
    </div>
  </main>
  <script>
    let pollTimer = 0;

    function updateSummary(parsed) {
      const sync = parsed && parsed.sync ? parsed.sync : {};
      const stats = sync.stats || sync;
      document.getElementById('summary').textContent = [
        'connected: ' + (sync.connected ?? '-'),
        'degraded: ' + (sync.degraded ?? '-'),
        'activeProtocol: ' + (sync.activeProtocol || '-'),
        'sourceIp: ' + (sync.sourceIp || stats.sourceIp || '-'),
        'packetsReceived: ' + (stats.packetsReceived ?? 0),
        'packetsDropped: ' + (stats.packetsDropped ?? 0),
        'inputFps: ' + (stats.inputFps ?? 0),
        'framesApplied: ' + (stats.framesApplied ?? 0),
        'lastSequence: ' + (stats.lastSequence ?? 0),
        'clockOffsetMs: ' + (stats.clockOffsetMs ?? 0),
        'timeoutEvents: ' + (stats.timeoutEvents ?? 0),
        'pollSaturationEvents: ' + (stats.pollSaturationEvents ?? 0)
      ].join('\n');
    }

    async function callApi(method, url, body) {
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) options.body = body;
      const res = await fetch(url, options);
      const text = await res.text();
      let parsed = text;
      try {
        const obj = JSON.parse(text);
        parsed = JSON.stringify(obj, null, 2);
        if (url === '/api/v1/sync/state' || url === '/api/v1/sync/connected') {
          updateSummary(obj);
        }
      } catch (_) {}
      document.getElementById('out').textContent = method + ' ' + url + ' -> HTTP ' + res.status + '\n\n' + parsed;
    }
    function getState() { callApi('GET', '/api/v1/sync/state'); }
    function getConnected() { callApi('GET', '/api/v1/sync/connected'); }
    function getConfig() { callApi('GET', '/api/v1/sync/config'); }
    function patchConfig() { callApi('PATCH', '/api/v1/sync/config', document.getElementById('configPayload').value); }
    function patchMode() {
      callApi('PATCH', '/api/v1/sync/mode', JSON.stringify({ mode: document.getElementById('modeValue').value }));
    }
    function togglePolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = 0;
        document.getElementById('summary').textContent += '\n\nauto poll: off';
        return;
      }
      pollTimer = setInterval(getState, 3000);
      getState();
    }
    getState();
  </script>
</div>
</body>
</html>
