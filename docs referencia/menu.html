<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Navigation</title>
<style>
/* Generated CSS Menu */
.gen-nav {
  display: flex;
  align-items: center;
  background: linear-gradient(90deg, #1e40af, #2563eb);
  min-height: 52px;
  border-radius: 8px;
  border: 0px solid #1e3a8a;
  box-shadow: 0 4px 12px rgba(0,0,0,.18);
  padding: 0 16px;
  position: relative;
  flex-wrap: wrap;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  box-sizing: border-box;
  
  display: flex;
}
.gen-nav *, .gen-nav *::before, .gen-nav *::after {
  box-sizing: border-box;
}
.gen-nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
}
.gen-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  margin-right: auto;
}
.gen-logo-text {
  color: #ffffff;
  font-size: 18px;
  font-weight: 600;
  white-space: nowrap;
}
.gen-hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  margin-left: auto;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction:row;    flex-wrap:wrap; gap:3px; width:36px; padding:6px;
  
}
.gen-hamburger span {
  display: block;
  background: #ffffff;
  transition: all .3s;
  width:8px;  height:8px; border-radius:2px;
}

.gen-nav > ul {
  display: flex; justify-content:center; flex: 1;
  flex-wrap: wrap;
}
.gen-nav > ul > li {
  position: relative;
}
.gen-nav > ul > li > a {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 16px;
  height: 52px;
  color: #ffffff;
  font-size: 14px;
  font-weight: 500;
  text-transform: none;
  text-decoration: none;
  transition: background .2s, color .2s;
  white-space: nowrap;
}
.gen-nav > ul > li > a:hover,
.gen-nav > ul > li:hover > a {
  background: #1d4ed8;
  color: #bfdbfe;
}
.gen-arrow { font-size: .7em; opacity: .8; }
/* Dropdown */
.gen-nav > ul > li > ul {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: #1e3a8a;
  min-width: 170px;
  border-radius: 0 0 6px 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  z-index: 1000;
  overflow: hidden;
}
.gen-nav > ul > li:hover > ul {
  display: block;
}
.gen-nav > ul > li > ul > li > a {
  display: block;
  padding: 10px 18px;
  color: #dbeafe;
  font-size: 13px;
  text-decoration: none;
  transition: background .15s, color .15s;
}
.gen-nav > ul > li > ul > li > a:hover {
  background: #1d4ed8;
  color: #ffffff;
}
.gen-nav > ul > li > ul > li:last-child {
  border-radius: 0 0 6px 6px;
  overflow: hidden;
}
.gen-nav > ul > li > ul > li:last-child > a {
  border-radius: 0 0 6px 6px;
}
/* Responsive */
@media (max-width: 768px) {
  .gen-hamburger { display: flex; }
  .gen-nav {
    display: flex;
    flex-wrap: wrap;
  }
  .gen-logo { margin-right: auto; justify-self: unset; }
  .gen-nav > ul {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    flex-direction: column;
    background: linear-gradient(90deg, #1e40af, #2563eb);
    border-radius: 0 0 8px 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,.2);
    z-index: 9999;
    padding: 8px 0;
    overflow: hidden;
  }
  .gen-nav > ul.open { display: flex; }
  /* Remove nav bottom radius when dropdown is open so they flow together */
  .gen-nav.mobile-open { border-radius: 8px 8px 0 0; }
  .gen-nav > ul > li > a { height: auto; padding: 14px 20px; }
  /* Reset desktop last-child rounding — not needed on mobile */
  .gen-nav > ul > li:last-child { border-radius: 0; overflow: visible; }
  .gen-nav > ul > li:last-child > a { border-radius: 0; }
  .gen-nav > ul > li > ul {
    display: block;
    position: static;
    box-shadow: none;
    border-radius: 0;
    overflow: visible;
    background: rgba(0,0,0,.15);
    min-width: 0;
  }
  /* No rounding on submenu items in mobile */
  .gen-nav > ul > li > ul > li:last-child { border-radius: 0; overflow: visible; }
  .gen-nav > ul > li > ul > li:last-child > a { border-radius: 0; }
  .gen-nav > ul > li > ul > li > a { padding: 10px 32px; }
  /* Hamburger animates to X when open */
  
  .gen-nav.mobile-open .gen-hamburger { opacity: 0.6; }
  
}
</style>
</head>
<body>

<nav class="gen-nav" id="gen-nav">
  <div class="gen-logo"><svg width="36px" height="36px" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;opacity:0.85;">
    <rect width="40" height="40" rx="8" fill="rgba(255,255,255,0.22)"/>
    <polygon points="20,6 24,15 34,16 27,23 29,33 20,28 11,33 13,23 6,16 16,15" fill="rgba(255,255,255,0.9)"/>
  </svg></div>
  <button class="gen-hamburger" id="gen-ham" aria-label="Toggle menu">
    <span></span><span></span><span></span><span></span>
  </button>
  <ul id="gen-menu"><li><a href="#">Home</a></li><li>
        <a href="/config">Config <span class="gen-arrow">▾</span></a>
        <ul><li><a href="/config/network">Network</a></li><li><a href="/config/microphone">Mic</a></li><li><a href="/config/gpio">Gpio</a></li><li><a href="/cpnfig/profiles">Profiles</a></li><li><a href="/config/palletes">Paletas</a></li><li><a href="/config/debug">Debug</a></li><li><a href="/config/jsoneditor">/manual</a></li></ul>
      </li><li>
        <a href="/API">API <span class="gen-arrow">▾</span></a>
        <ul><li><a href="/api/state">State</a></li><li><a href="/api/network">Netword</a></li><li><a href="/api/mic">mic</a></li><li><a href="/api/gpio">gpio</a></li><li><a href="/api/debug">debug</a></li><li><a href="/api/profiles">profiles</a></li><li><a href="/api/hardware">Hardware</a></li><li><a href="/api/release">Release</a></li><li><a href="/api/configall">config all</a></li></ul>
      </li><li>
        <a href="#">About <span class="gen-arrow">▾</span></a>
        <ul><li><a href="/version">Version</a></li><li><a href="/hardware">hardware</a></li><li><a href="/aboutme">About me</a></li></ul>
      </li></ul>
</nav>

<script>
// Mobile menu toggle
document.getElementById('gen-ham').addEventListener('click', function() {
  var nav = document.getElementById('gen-nav');
  var menu = document.getElementById('gen-menu');
  var isOpen = menu.classList.toggle('open');
  nav.classList.toggle('mobile-open', isOpen);
});
 
// Close menu when clicking outside
document.addEventListener('click', function(e) {
  var nav = document.getElementById('gen-nav');
  var menu = document.getElementById('gen-menu');
  if (!nav.contains(e.target) && menu.classList.contains('open')) {
    menu.classList.remove('open');
    nav.classList.remove('mobile-open');
  }
});
</script>
</body>
</html>
